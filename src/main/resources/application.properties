spring.application.name=quiz_1141121
#修改 server 啟動的 port，預設是 8080
#server.port=8083，這個語句可以改端口號
#設定資料庫連接
# 3306是連接 mysql 的 port；p1140818 是要連接的資料庫名稱
# rewriteBatchedStatements=true: 可以批次新增
#3306是端口號，p1141121數據庫名字
spring.datasource.url=jdbc:mysql://localhost:3306/quiz_1141121?serverTimezone=GMT%2B8&useSSL=false&rewriteBatchedStatements=true
spring.datasource.username=root
spring.datasource.password=123456
#驅動mysql的程式：
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=true

